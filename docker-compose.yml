services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RATE_LIMIT_MAX_TOKENS: 20
      RATE_LIMIT_REFILL_RATE: 5
      RATE_LIMIT_FALLBACK_MODE: LocalTokenBucket
      LOCAL_MAX_TOKENS: 10
      LOCAL_REFILL_RATE: 2

  test:
    image: redis-rate-limiter-app
    working_dir: /work
    volumes:
      - .:/work
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHONPATH: /app
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ["python3", "tests/verify_functionality.py"]

  pytest:
    image: redis-rate-limiter-app
    working_dir: /work
    volumes:
      - .:/work
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHONPATH: /app:/work
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ["pytest", "-q", "tests/test_integration.py"]

  bench:
    image: redis-rate-limiter-app
    working_dir: /work
    volumes:
      - .:/work
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHONPATH: /app:/work
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ["python3", "tests/benchmark.py"]

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      app:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards/json:ro
    depends_on:
      prometheus:
        condition: service_started
