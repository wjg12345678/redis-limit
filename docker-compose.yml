services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

  test:
    image: redis-rate-limiter-app
    working_dir: /work
    volumes:
      - .:/work
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHONPATH: /app
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ["python3", "tests/verify_functionality.py"]

  bench:
    image: redis-rate-limiter-app
    working_dir: /work
    volumes:
      - .:/work
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHONPATH: /app
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ["python3", "tests/benchmark.py"]
