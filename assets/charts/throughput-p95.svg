<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TokenBucket P95 Latency</title>
  <desc id="desc">Bar chart comparing P95 latency in microseconds for independent-key and shared-key scenarios.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4efe6"/>
      <stop offset="100%" stop-color="#fbf8f2"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9863b"/>
      <stop offset="100%" stop-color="#b85f22"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7c86"/>
      <stop offset="100%" stop-color="#1d5961"/>
    </linearGradient>
  </defs>
  <rect width="900" height="420" fill="url(#bg)"/>
  <rect x="36" y="28" width="828" height="356" rx="26" fill="#fffdfa" stroke="#ddd1bf"/>
  <text x="72" y="78" font-family="Georgia, serif" font-size="30" fill="#2e261e">TokenBucket P95 Latency</text>
  <text x="72" y="108" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#756452">Lower is better, same environment and worker count</text>

  <line x1="120" y1="320" x2="792" y2="320" stroke="#5b4a38" stroke-width="2"/>
  <line x1="120" y1="320" x2="120" y2="136" stroke="#5b4a38" stroke-width="2"/>

  <g font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#756452">
    <text x="78" y="324">0</text>
    <text x="64" y="278">200</text>
    <text x="64" y="232">400</text>
    <text x="64" y="186">600</text>
    <text x="64" y="140">800</text>
  </g>

  <g stroke="#ebe1d3" stroke-width="1">
    <line x1="120" y1="274" x2="792" y2="274"/>
    <line x1="120" y1="228" x2="792" y2="228"/>
    <line x1="120" y1="182" x2="792" y2="182"/>
    <line x1="120" y1="136" x2="792" y2="136"/>
  </g>

  <rect x="220" y="188.6" width="160" height="131.4" rx="20" fill="url(#barA)"/>
  <rect x="532" y="217.1" width="160" height="102.9" rx="20" fill="url(#barB)"/>

  <g font-family="Helvetica, Arial, sans-serif" fill="#2e261e">
    <text x="300" y="177" text-anchor="middle" font-size="20">571.30 us</text>
    <text x="612" y="205" text-anchor="middle" font-size="20">447.45 us</text>
    <text x="300" y="351" text-anchor="middle" font-size="16">independent-key</text>
    <text x="612" y="351" text-anchor="middle" font-size="16">shared-key</text>
  </g>

  <rect x="640" y="62" width="18" height="18" rx="4" fill="url(#barA)"/>
  <text x="666" y="76" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#756452">independent-key</text>
  <rect x="640" y="90" width="18" height="18" rx="4" fill="url(#barB)"/>
  <text x="666" y="104" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#756452">shared-key</text>
</svg>
