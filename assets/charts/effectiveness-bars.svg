<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Limiter Effectiveness</title>
  <desc id="desc">Bar chart showing theoretical allowed, actual allowed, and over-issued counts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4efe6"/>
      <stop offset="100%" stop-color="#fbf8f2"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9863b"/>
      <stop offset="100%" stop-color="#b85f22"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7c86"/>
      <stop offset="100%" stop-color="#1d5961"/>
    </linearGradient>
    <linearGradient id="barC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d34f4f"/>
      <stop offset="100%" stop-color="#a83737"/>
    </linearGradient>
  </defs>
  <rect width="900" height="420" fill="url(#bg)"/>
  <rect x="36" y="28" width="828" height="356" rx="26" fill="#fffdfa" stroke="#ddd1bf"/>
  <text x="72" y="78" font-family="Georgia, serif" font-size="30" fill="#2e261e">Limiter Effectiveness</text>
  <text x="72" y="108" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#756452">shared key, 4 workers, max_tokens=20, refill_rate=5</text>

  <line x1="120" y1="320" x2="792" y2="320" stroke="#5b4a38" stroke-width="2"/>
  <line x1="120" y1="320" x2="120" y2="136" stroke="#5b4a38" stroke-width="2"/>

  <g font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#756452">
    <text x="78" y="324">0</text>
    <text x="66" y="288">10</text>
    <text x="66" y="252">20</text>
    <text x="66" y="216">30</text>
    <text x="66" y="180">40</text>
    <text x="66" y="144">50</text>
  </g>

  <g stroke="#ebe1d3" stroke-width="1">
    <line x1="120" y1="284" x2="792" y2="284"/>
    <line x1="120" y1="248" x2="792" y2="248"/>
    <line x1="120" y1="212" x2="792" y2="212"/>
    <line x1="120" y1="176" x2="792" y2="176"/>
    <line x1="120" y1="140" x2="792" y2="140"/>
  </g>

  <rect x="170" y="158" width="140" height="162" rx="20" fill="url(#barA)"/>
  <rect x="390" y="158" width="140" height="162" rx="20" fill="url(#barB)"/>
  <rect x="610" y="320" width="140" height="0" rx="20" fill="url(#barC)"/>

  <g font-family="Helvetica, Arial, sans-serif" fill="#2e261e">
    <text x="240" y="146" text-anchor="middle" font-size="20">45</text>
    <text x="460" y="146" text-anchor="middle" font-size="20">45</text>
    <text x="680" y="308" text-anchor="middle" font-size="20">0</text>
    <text x="240" y="351" text-anchor="middle" font-size="15">theoretical-allowed</text>
    <text x="460" y="351" text-anchor="middle" font-size="15">actual-allowed</text>
    <text x="680" y="351" text-anchor="middle" font-size="15">over-issued</text>
  </g>

  <rect x="640" y="62" width="18" height="18" rx="4" fill="url(#barA)"/>
  <text x="666" y="76" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#756452">theoretical</text>
  <rect x="640" y="90" width="18" height="18" rx="4" fill="url(#barB)"/>
  <text x="666" y="104" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#756452">actual</text>
</svg>
