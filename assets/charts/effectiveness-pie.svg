<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Allowed vs Denied</title>
  <desc id="desc">Donut chart showing 45 allowed and 47515 denied requests.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4efe6"/>
      <stop offset="100%" stop-color="#fbf8f2"/>
    </linearGradient>
    <linearGradient id="allow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7c86"/>
      <stop offset="100%" stop-color="#1d5961"/>
    </linearGradient>
    <linearGradient id="deny" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d34f4f"/>
      <stop offset="100%" stop-color="#a83737"/>
    </linearGradient>
  </defs>
  <rect width="900" height="420" fill="url(#bg)"/>
  <rect x="36" y="28" width="828" height="356" rx="26" fill="#fffdfa" stroke="#ddd1bf"/>
  <text x="72" y="78" font-family="Georgia, serif" font-size="30" fill="#2e261e">Allowed vs Denied</text>
  <text x="72" y="108" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#756452">effectiveness run under strict no-overissue assertion</text>

  <circle cx="285" cy="215" r="110" fill="none" stroke="url(#deny)" stroke-width="54" stroke-dasharray="690.85 0"/>
  <circle cx="285" cy="215" r="110" fill="none" stroke="url(#allow)" stroke-width="54" stroke-dasharray="0.65 690.20" transform="rotate(-90 285 215)"/>
  <circle cx="285" cy="215" r="74" fill="#fffdfa"/>

  <text x="285" y="205" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#2e261e">allowed ratio</text>
  <text x="285" y="236" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#2e261e">0.09%</text>

  <rect x="505" y="148" width="22" height="22" rx="5" fill="url(#allow)"/>
  <text x="542" y="165" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#2e261e">allowed: 45</text>
  <text x="542" y="191" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#756452">requests passed after token check</text>

  <rect x="505" y="230" width="22" height="22" rx="5" fill="url(#deny)"/>
  <text x="542" y="247" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#2e261e">denied: 47,515</text>
  <text x="542" y="273" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#756452">requests rejected to enforce quota</text>

  <line x1="505" y1="305" x2="760" y2="305" stroke="#ebe1d3"/>
  <text x="505" y="332" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#2e261e">Denied ratio: 99.91%</text>
  <text x="505" y="356" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#2e261e">Assertion result: PASS</text>
</svg>
